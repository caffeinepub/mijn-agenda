<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b2e"/>
      <stop offset="100%" style="stop-color:#16132a"/>
    </linearGradient>
    <linearGradient id="calGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2a45"/>
      <stop offset="100%" style="stop-color:#252240"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Calendar body -->
  <rect x="96" y="128" width="320" height="272" rx="20" ry="20" fill="url(#calGrad)" filter="url(#shadow)"/>

  <!-- Calendar header band -->
  <rect x="96" y="128" width="320" height="70" rx="20" ry="20" fill="#3d2f6a"/>
  <rect x="96" y="168" width="320" height="30" fill="#3d2f6a"/>

  <!-- Calendar rings / clips -->
  <rect x="176" y="104" width="24" height="48" rx="8" ry="8" fill="#c8a04a"/>
  <rect x="312" y="104" width="24" height="48" rx="8" ry="8" fill="#c8a04a"/>

  <!-- Header label: "Agenda" simplified as 3 lines -->
  <rect x="140" y="148" width="100" height="6" rx="3" fill="#c8a04a" opacity="0.9"/>
  <rect x="140" y="160" width="60" height="4" rx="2" fill="#9b7fc4" opacity="0.5"/>

  <!-- Day grid rows -->
  <!-- Row 1 -->
  <rect x="116" y="224" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="164" y="224" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="212" y="224" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="260" y="224" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="308" y="224" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="356" y="224" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>

  <!-- Row 2 -->
  <rect x="116" y="264" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="164" y="264" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <!-- Today highlight - amber cell -->
  <rect x="212" y="264" width="36" height="28" rx="6" fill="#c8a04a"/>
  <circle cx="230" cy="278" r="6" fill="#1e1b2e"/>
  <rect x="260" y="264" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="308" y="264" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="356" y="264" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>

  <!-- Row 3 -->
  <rect x="116" y="304" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="164" y="304" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="212" y="304" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <!-- Event dot -->
  <rect x="260" y="304" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <circle cx="278" cy="318" r="4" fill="#9b7fc4"/>
  <rect x="308" y="304" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>
  <rect x="356" y="304" width="36" height="28" rx="6" fill="#2a2748" opacity="0.7"/>

  <!-- Row 4 (partial) -->
  <rect x="116" y="344" width="36" height="28" rx="6" fill="#2a2748" opacity="0.5"/>
  <rect x="164" y="344" width="36" height="28" rx="6" fill="#2a2748" opacity="0.5"/>
  <rect x="212" y="344" width="36" height="28" rx="6" fill="#2a2748" opacity="0.5"/>
  <rect x="260" y="344" width="36" height="28" rx="6" fill="#2a2748" opacity="0.5"/>

  <!-- Amber accent glow dot (top-right corner decoration) -->
  <circle cx="390" cy="90" r="18" fill="#c8a04a" opacity="0.15"/>
  <circle cx="390" cy="90" r="10" fill="#c8a04a" opacity="0.3"/>
  <circle cx="390" cy="90" r="5" fill="#c8a04a" opacity="0.8"/>
</svg>
